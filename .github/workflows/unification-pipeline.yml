name: Repo Unification Pipeline

on:
  workflow_dispatch:
    inputs:
      owner:
        description: GitHub owner to scan
        required: true
        default: OsoPanda1
      target_repo:
        description: Target hub repository
        required: true
        default: tamv-digital-nexus
      max_repos:
        description: Max repos to include
        required: true
        default: "194"
      batch_size:
        description: Number of git ops per batch
        required: true
        default: "20"
      dry_run:
        description: Dry run (true/false)
        required: true
        default: "true"
      merge_branch:
        description: Optional branch to merge from each remote
        required: false
        default: ""

jobs:
  unification-execution:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_VERSION: "20"
      PORT: "3001"
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      JWT_SECRET: ci-unification-secret
      GITHUB_FEDERATION_OWNER: ${{ github.event.inputs.owner }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Install server dependencies
        run: npm --prefix server ci --legacy-peer-deps

      - name: Start backend API
        run: |
          npm --prefix server run dev > unification-api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API health
        run: |
          for i in {1..45}; do
            if curl -fsS "http://127.0.0.1:3001/health" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          tail -n 200 unification-api.log || true
          exit 1

      - name: Execute unification batches
        run: |
          node tools/ci/unification-executor.mjs \
            --owner=${{ github.event.inputs.owner }} \
            --targetRepo=${{ github.event.inputs.target_repo }} \
            --maxRepos=${{ github.event.inputs.max_repos }} \
            --batchSize=${{ github.event.inputs.batch_size }} \
            --dryRun=${{ github.event.inputs.dry_run }} \
            --mergeBranch=${{ github.event.inputs.merge_branch }} \
            --apiUrl=http://127.0.0.1:3001 \
            --report=unification-report.json

      - name: Upload unification report
        uses: actions/upload-artifact@v4
        with:
          name: unification-report
          path: |
            unification-report.json
            unification-api.log

      - name: Stop backend API
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill "$(cat api.pid)" || true
          fi
